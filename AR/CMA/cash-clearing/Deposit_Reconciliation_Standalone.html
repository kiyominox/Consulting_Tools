<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deposit Reconciliation — CMA's</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #F2F5F7; }
  input, select, button { font-family: 'Public Sans', sans-serif; }
  #__err { display:none; position:fixed; left:0; right:0; bottom:0; background:#8e1f1f; color:#fff; padding:10px 16px; font:12px/1.4 ui-monospace,monospace; z-index:9999; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="app"></div>
<div id="__err"></div>
<template id="__tpl"><sc-if value="{{notReady}}" hint-placeholder-val="{{false}}">
  <div style="font-family:'Public Sans',sans-serif;color:#8294A6;padding:40px;text-align:center;font-size:14px">Loading the reconciliation engine…</div>
</sc-if>

<sc-if value="{{ready}}" hint-placeholder-val="{{true}}">
<div style="display:grid;grid-template-columns:300px minmax(0,1fr);min-height:100vh;font-family:'Public Sans',sans-serif;color:#22303D">

  <!-- ══════════ RAIL ══════════ -->
  <div style="background:#1C3D5A">
    <div style="position:sticky;top:0;height:100vh;box-sizing:border-box;overflow:auto;display:flex;flex-direction:column;gap:12px;padding:18px 16px">

      <div style="background:#ffffff;border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:54px">
        <sc-for list="{{logos}}" as="lg" hint-placeholder-count="1">
          <img src="{{lg.src}}" style="height:36px;max-width:100%;object-fit:contain" alt="store logo">
        </sc-for>
        <sc-if value="{{noLogo}}" hint-placeholder-val="{{false}}">
          <div style="display:flex;align-items:center;gap:9px">
            <div style="width:30px;height:30px;border-radius:50%;background:#C2452D;color:#fff;display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:800;font-size:9px">CMA's</div>
            <span style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:#1C3D5A">{{storeName}}</span>
          </div>
        </sc-if>
      </div>

      <div style="display:flex;flex-direction:column;gap:7px">
        <x-select value="{{coStr}}" onChange="{{onStoreSel}}" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:#16324A;color:#fff;font-size:13px;font-weight:600;box-sizing:border-box">
          <sc-for list="{{storeOpts}}" as="o" hint-placeholder-count="2">
            <x-option value="{{o.v}}">{{o.label}}</x-option>
          </sc-for>
        </x-select>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:#9FB3C6;font-size:11.5px;font-weight:600;white-space:nowrap">Cash date</span>
          <input type="date" value="{{cashDate}}" onChange="{{onDateChange}}" style="flex:1;padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:#16324A;color:#fff;font-size:12.5px;box-sizing:border-box;min-width:0">
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:5px;margin-top:4px">
        <sc-for list="{{railItems}}" as="it" hint-placeholder-count="5">
          <div onClick="{{it.onClick}}" style="{{it.rowStyle}}">
            <div style="{{it.iconStyle}}">{{it.icon}}</div>
            <div style="min-width:0">
              <div style="color:#ffffff;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{it.title}}</div>
              <div style="{{it.subStyle}}">{{it.sub}}</div>
            </div>
          </div>
        </sc-for>
      </div>

      <div style="margin-top:auto;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:14px 16px;display:flex;flex-direction:column;gap:9px">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="color:#9FB3C6;font-size:11.5px;font-weight:600;letter-spacing:.05em">DEPOSIT</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:14.5px;color:#ffffff">{{depStr}}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="color:#9FB3C6;font-size:11.5px;font-weight:600;letter-spacing:.05em">RECONCILED</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:14.5px;color:#ffffff">{{recStr}}</span>
        </div>
        <div style="height:1px;background:rgba(255,255,255,.15)"></div>
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="color:#9FB3C6;font-size:11.5px;font-weight:700;letter-spacing:.05em">VARIANCE</span>
          <span style="{{varStyle}}">{{varStr}}</span>
        </div>
        <div style="color:#9FB3C6;font-size:11px;line-height:1.4">{{varNote}}</div>
      </div>

      <div style="display:flex;gap:6px">
        <button onClick="{{onSaveSession}}" style="flex:1;background:none;border:1px solid rgba(255,255,255,.25);color:#C9D6E2;border-radius:7px;padding:7px 4px;font-size:11.5px;font-weight:600;cursor:pointer">Save session</button>
        <button onClick="{{onLoadSessionClick}}" style="flex:1;background:none;border:1px solid rgba(255,255,255,.25);color:#C9D6E2;border-radius:7px;padding:7px 4px;font-size:11.5px;font-weight:600;cursor:pointer">Load session</button>
        <button onClick="{{onOpenSetup}}" style="flex:1;background:none;border:1px solid rgba(255,255,255,.25);color:#C9D6E2;border-radius:7px;padding:7px 4px;font-size:11.5px;font-weight:600;cursor:pointer">{{setupLabel}}</button>
      </div>
    </div>
  </div>

  <!-- ══════════ MAIN ══════════ -->
  <div style="padding:20px 26px 60px;display:flex;flex-direction:column;gap:13px;min-width:0">

    <div style="display:flex;align-items:center;gap:14px;padding:2px 2px 4px">
      <div>
        <div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:20px;color:#1C3D5A">Daily Deposit Reconciliation</div>
        <div style="font-size:12.5px;color:#8294A6;margin-top:1px">{{headerSub}}</div>
      </div>
      <sc-if value="{{scanChip}}" hint-placeholder-val="{{false}}">
        <div style="margin-left:auto;background:#E4F3EB;border:1px solid #9CD4B2;border-radius:8px;padding:6px 13px;font-size:12px;color:#1E7A4C;font-weight:700">✓ Matching &amp; missing-payment check ran automatically</div>
      </sc-if>
    </div>

    <!-- ── SECTION 1 · IMPORT ── -->
    <div id="sec1">
      <sc-if value="{{closed1}}" hint-placeholder-val="{{false}}">
        <div onClick="{{onToggle1}}" style="background:#ffffff;border:1px solid #DCE3EA;border-radius:11px;padding:13px 18px;display:flex;align-items:center;gap:12px;cursor:pointer">
          <span style="width:22px;height:22px;border-radius:50%;background:#E4F3EB;border:1.5px solid #9CD4B2;color:#1E7A4C;font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">✓</span>
          <span style="font-size:13.5px;font-weight:600;color:#42546A">1 · Import files — {{sum1}}</span>
          <span style="margin-left:auto;font-size:12.5px;color:#8294A6">Change files ▾</span>
        </div>
      </sc-if>
      <sc-if value="{{open1}}" hint-placeholder-val="{{true}}">
        <div style="background:#ffffff;border:1.5px solid #B9C7D4;border-radius:12px;overflow:hidden">
          <div style="padding:15px 18px;border-bottom:1px solid #E8EDF2;display:flex;align-items:flex-start;gap:12px">
            <div>
              <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;color:#1C3D5A">1 · Import files</div>
              <div style="font-size:12.5px;color:#8294A6;margin-top:3px">Drop the CDK schedule and the processor's card / cash / check reports. Excel (.xlsx&nbsp;/&nbsp;.xlsm), .csv, .tsv or .txt. The moment both are in, matching and the missing-payment check run on their own.</div>
            </div>
            <span onClick="{{onToggle1}}" style="margin-left:auto;font-size:12.5px;color:#8294A6;cursor:pointer;white-space:nowrap">collapse ▴</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 18px">
            <div onDragOver="{{onSchDragOver}}" onDrop="{{onSchDrop}}" style="border:2px dashed #C9D3DD;border-radius:10px;padding:18px;text-align:center;background:#FAFBFC;display:flex;flex-direction:column;gap:9px;align-items:center">
              <div style="font-size:13px;font-weight:700;color:#1C3D5A">CDK Schedule — Cash Clearing</div>
              <button onClick="{{onPickSch}}" style="background:#1C3D5A;color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer">Upload schedule…</button>
              <div style="font-size:11px;color:#8294A6">or drag &amp; drop the export file here</div>
              <div style="{{schStatusStyle}}">{{schStatus}}</div>
            </div>
            <div onDragOver="{{onCCDragOver}}" onDrop="{{onCCDrop}}" style="border:2px dashed #C9D3DD;border-radius:10px;padding:18px;text-align:center;background:#FAFBFC;display:flex;flex-direction:column;gap:9px;align-items:center">
              <div style="font-size:13px;font-weight:700;color:#1C3D5A">Processor Reports — cards, cash &amp; checks</div>
              <button onClick="{{onPickCC}}" style="background:#1C3D5A;color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer">Add report file(s)…</button>
              <div style="font-size:11px;color:#8294A6">files add together — re-adding a file with the same name replaces it</div>
              <sc-if value="{{hasCCChips}}" hint-placeholder-val="{{false}}">
                <div style="display:flex;flex-direction:column;gap:5px;width:100%;text-align:left">
                  <sc-for list="{{ccChips}}" as="f" hint-placeholder-count="2">
                    <div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #DCE3EA;border-radius:7px;padding:5px 10px;font-size:12px">
                      <span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📄 {{f.name}}</span>
                      <span style="margin-left:auto;color:#8294A6;font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap">{{f.meta}}</span>
                      <button onClick="{{f.onRemove}}" style="background:none;border:1px solid #DCE3EA;border-radius:5px;color:#8294A6;font-size:11px;cursor:pointer;padding:1px 7px">✕</button>
                    </div>
                  </sc-for>
                </div>
              </sc-if>
              <div style="{{ccStatusStyle}}">{{ccStatus}}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:11px 18px;background:#F7F9FB;border-top:1px solid #E8EDF2">
            <button onClick="{{onSample}}" style="background:#5B6C80;color:#fff;border:0;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer">Generate using sample data</button>
            <span style="font-size:12px;color:#8294A6">Try the whole workflow without real files — everything runs locally in this browser; no data leaves the page.</span>
          </div>
        </div>
      </sc-if>
    </div>

    <!-- ── SECTION 2 · DEPOSITS ── -->
    <div id="sec2">
      <sc-if value="{{closed2}}" hint-placeholder-val="{{false}}">
        <div onClick="{{onToggle2}}" style="background:#ffffff;border:1px solid #DCE3EA;border-radius:11px;padding:13px 18px;display:flex;align-items:center;gap:12px;cursor:pointer">
          <span style="width:22px;height:22px;border-radius:50%;background:#E4F3EB;border:1.5px solid #9CD4B2;color:#1E7A4C;font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">✓</span>
          <span style="font-size:13.5px;font-weight:600;color:#42546A">2 · Deposit totals — {{sum2}}</span>
          <span style="margin-left:auto;font-size:12.5px;color:#8294A6">Edit ▾</span>
        </div>
      </sc-if>
      <sc-if value="{{open2}}" hint-placeholder-val="{{true}}">
        <div style="background:#ffffff;border:1.5px solid #B9C7D4;border-radius:12px;overflow:hidden">
          <div style="padding:15px 18px;border-bottom:1px solid #E8EDF2;display:flex;align-items:flex-start;gap:12px">
            <div>
              <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;color:#1C3D5A">2 · Deposit totals</div>
              <div style="font-size:12.5px;color:#8294A6;margin-top:3px">Type the actual totals from today's deposit slip, by type. {{depHint}}</div>
            </div>
            <span onClick="{{onToggle2}}" style="margin-left:auto;font-size:12.5px;color:#8294A6;cursor:pointer;white-space:nowrap">collapse ▴</span>
          </div>
          <div style="padding:6px 18px 14px;max-width:680px">
            <div style="display:grid;grid-template-columns:170px 150px 130px 130px;gap:12px;padding:9px 0;font-size:11.5px;font-weight:700;color:#8294A6;letter-spacing:.04em;border-bottom:1px solid #E8EDF2"><span>TYPE</span><span style="text-align:right">AMOUNT $</span><span>ACCOUNT</span><span>CONTROL</span></div>
            <sc-for list="{{depRows}}" as="dr" hint-placeholder-count="3">
              <div style="display:grid;grid-template-columns:170px 150px 130px 130px;gap:12px;align-items:center;padding:7px 0;border-bottom:1px solid #F0F3F6">
                <span style="font-size:13px;font-weight:600">{{dr.type}}</span>
                <input value="{{dr.val}}" onChange="{{dr.onChange}}" placeholder="0.00" style="border:1.5px solid #DCE3EA;border-radius:7px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:right;width:100%;box-sizing:border-box">
                <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#5A6B7E">{{dr.acct}}</span>
                <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#5A6B7E">{{dr.control}}</span>
              </div>
            </sc-for>
            <div style="display:grid;grid-template-columns:170px 150px;gap:12px;padding:10px 0 2px;font-size:13.5px">
              <b>Total deposit</b>
              <b style="font-family:'IBM Plex Mono',monospace;text-align:right">{{depTotStr}}</b>
            </div>
          </div>
        </div>
      </sc-if>
    </div>

    <!-- ── SECTION 3 · SCHEDULE ── -->
    <div id="sec3" style="background:#ffffff;border:1.5px solid #B9C7D4;border-radius:12px;overflow:hidden">
      <div style="padding:15px 18px;border-bottom:1px solid #E8EDF2">
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;color:#1C3D5A">3 · Check the schedule</div>
        <div style="font-size:12.5px;color:#8294A6;margin-top:3px">Items paid by card matched on their own — they're done. For the rest, only mark what was actually in today's deposit; anything not received simply stays on the list for tomorrow.</div>
      </div>
      <sc-if value="{{schedEmpty}}" hint-placeholder-val="{{false}}">
        <div style="padding:26px;text-align:center;color:#8294A6;font-size:13px">Upload the CDK schedule in step 1 to begin.</div>
      </sc-if>
      <sc-if value="{{schedLoaded}}" hint-placeholder-val="{{true}}">
        <div style="padding:12px 18px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #E8EDF2">
          <button onClick="{{onTabNeeds}}" style="{{tabNeedsStyle}}">Not matched · {{needsCount}}</button>
          <button onClick="{{onTabDone}}" style="{{tabDoneStyle}}">Matched &amp; answered · {{doneCount}}</button>
          <button onClick="{{onTabAll}}" style="{{tabAllStyle}}">All · {{allCount}}</button>
          <span style="margin-left:auto;font-size:12.5px;color:#5A6B7E">Schedule received&nbsp; <b style="font-family:'IBM Plex Mono',monospace;color:#22303D">{{schedRecTot}}</b></span>
        </div>
        <div style="display:grid;grid-template-columns:150px 64px 105px 175px 1fr 115px;gap:14px;padding:9px 18px;background:#F7F9FB;font-size:11.5px;font-weight:700;color:#8294A6;letter-spacing:.04em;border-bottom:1px solid #E8EDF2">
          <span>CONTROL</span><span>DAYS</span><span style="text-align:right">OWED $</span><span>PAID BY CARD</span><span style="text-align:right">YOUR ANSWER</span><span style="text-align:right">RECEIVED $</span>
        </div>
        <sc-for list="{{schedRows}}" as="r" hint-placeholder-count="4">
          <div style="{{r.rowStyle}}">
            <div><div style="font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600">{{r.control}}</div><div style="font-size:11px;color:#8294A6">{{r.moreInfo}}</div></div>
            <div><span style="{{r.daysStyle}}">{{r.days}}</span></div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:13.5px;text-align:right">{{r.owed}}</div>
            <div>
              <sc-if value="{{r.hasCC}}" hint-placeholder-val="{{false}}">
                <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1E7A4C;font-weight:600">✓ {{r.found}}</div>
                <div style="font-size:11px;color:#8294A6">{{r.cards}}</div>
              </sc-if>
              <sc-if value="{{r.noCC}}" hint-placeholder-val="{{false}}">
                <span style="color:#B6C2CE;font-size:13px">—</span>
              </sc-if>
            </div>
            <div style="display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
              <sc-if value="{{r.donPending}}" hint-placeholder-val="{{false}}">
                <span style="font-size:12px;color:#7A540E;font-weight:600">🎁 {{r.donQuestion}}</span>
                <button onClick="{{r.onDonYes}}" style="background:#1E7A4C;color:#fff;border:0;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">Yes, donation</button>
                <button onClick="{{r.onDonNo}}" style="background:#fff;border:1.5px solid #DCE3EA;border-radius:7px;padding:7px 11px;font-size:12px;font-weight:600;color:#5A6B7E;cursor:pointer">No</button>
              </sc-if>
              <sc-if value="{{r.donYes}}" hint-placeholder-val="{{false}}">
                <span style="background:#E4F3EB;border:1px solid #9CD4B2;color:#1E7A4C;border-radius:12px;padding:4px 11px;font-size:12px;font-weight:700">🎁 {{r.donChip}}</span>
                <button onClick="{{r.onDonUndo}}" style="background:none;border:0;color:#8294A6;font-size:11.5px;cursor:pointer;text-decoration:underline;padding:0">undo</button>
              </sc-if>
              <sc-if value="{{r.noCC}}" hint-placeholder-val="{{false}}">
                <button onClick="{{r.onInc}}" style="{{r.incStyle}}">{{r.incLabel}}</button>
              </sc-if>
              <input value="{{r.manualAmt}}" onChange="{{r.onMan}}" placeholder="{{r.manPlaceholder}}" style="width:104px;border:1.5px solid #DCE3EA;border-radius:7px;padding:7px 9px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;text-align:right">
            </div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;text-align:right">{{r.recCell}}</div>
          </div>
        </sc-for>
        <sc-if value="{{needsEmpty}}" hint-placeholder-val="{{false}}">
          <div style="padding:20px;text-align:center;color:#1E7A4C;font-size:13px;font-weight:600">Nothing left to review — every item is matched or answered. ✓</div>
        </sc-if>
      </sc-if>
    </div>

    <!-- ── SECTION 4 · ANYTHING MISSING ── -->
    <div id="sec4" style="background:#ffffff;border:1.5px solid #B9C7D4;border-radius:12px;overflow:hidden">
      <div style="padding:15px 18px;border-bottom:1px solid #E8EDF2;display:flex;align-items:flex-start;gap:12px">
        <div>
          <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;color:#1C3D5A">4 · Anything missing?</div>
          <div style="font-size:12.5px;color:#8294A6;margin-top:3px">{{nosHint}}</div>
        </div>
        <sc-if value="{{nosRanChip}}" hint-placeholder-val="{{false}}">
          <span style="margin-left:auto;background:#E4F3EB;border:1px solid #9CD4B2;border-radius:14px;padding:4px 12px;font-size:11.5px;color:#1E7A4C;font-weight:700;white-space:nowrap">checked automatically ✓</span>
        </sc-if>
      </div>

      <sc-if value="{{hasSkipped}}" hint-placeholder-val="{{false}}">
        <div style="margin:14px 18px 0;background:#FBF1DC;border:1.5px solid #E4C887;border-radius:10px;padding:13px 16px">
          <div style="font-size:13px;font-weight:700;color:#7A540E">⚠ {{skippedTitle}}</div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:9px">
            <sc-for list="{{skippedRows}}" as="sk" hint-placeholder-count="1">
              <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #EEDCAB;border-radius:8px;padding:7px 12px;font-size:12.5px">
                <b style="font-family:'IBM Plex Mono',monospace">{{sk.amt}}</b>
                <span style="color:#5A6B7E">{{sk.desc}}</span>
                <button onClick="{{sk.onAdd}}" style="margin-left:auto;background:#1C3D5A;color:#fff;border:0;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">Add as line — type the RO #</button>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{nosWaiting}}" hint-placeholder-val="{{false}}">
        <div style="padding:24px;text-align:center;color:#8294A6;font-size:13px">Waiting for files — this check runs automatically once the schedule and a processor report are loaded.</div>
      </sc-if>
      <sc-if value="{{nosAllGood}}" hint-placeholder-val="{{false}}">
        <div style="padding:22px;text-align:center;color:#1E7A4C;font-size:13px;font-weight:600">Every processor payment is on the schedule — nothing missing. ✓</div>
      </sc-if>

      <sc-if value="{{hasNos}}" hint-placeholder-val="{{true}}">
        <div style="padding:6px 18px 4px">
          <div style="display:grid;grid-template-columns:150px 110px 240px 1fr 90px 36px;gap:12px;padding:9px 0;font-size:11.5px;font-weight:700;color:#8294A6;letter-spacing:.04em;border-bottom:1px solid #E8EDF2">
            <span>RO / INVOICE #</span><span style="text-align:right">AMOUNT $</span><span>{{nosCatHdr}}</span><span>NOTE</span><span>JE ACCT</span><span></span>
          </div>

<script>
const E = (function(){
/* Deposit Reconciliation engine — pure logic, no DOM.
   Ported from Cash_Clearing_Reconciliation.html v1.7. Parsing, matching,
   posting order and AGJE line format are byte-identical to the original. */

function sanitizeConfig(c) {
  const stores = (c && Array.isArray(c.stores) ? c.stores : [])
    .map(s => ({
      co: Number(s.co) || 0,
      name: String(s.name == null ? "" : s.name).trim(),
      clearing: String(s.clearing == null ? "" : s.clearing).trim(),
      donation: String(s.donation == null ? "" : s.donation).trim(),
      donationControl: String(s.donationControl == null ? "" : s.donationControl).trim(),
      deposits: (Array.isArray(s.deposits) ? s.deposits : [])
        .map(d => ({ type: String(d.type || "").trim().toUpperCase(), acct: String(d.acct || "").trim(), prefix: String(d.prefix || "").trim().toUpperCase() }))
        .filter(d => d.type !== ""),
      nosCats: (Array.isArray(s.nosCats) ? s.nosCats : [])
        .map(x => ({ label: String(x.label || "").trim().toUpperCase(), acct: String(x.acct || "").trim() }))
        .filter(x => x.label !== ""),
    }))
    .filter(s => s.co > 0);
  return { stores };
}
function nosAccount(store, category) {
  if (!category) return store.clearing;
  const c = store.nosCats.find(x => x.label === category);
  return c ? c.acct : store.clearing;
}

function splitRows(text) {
  return text.replace(/\r\n?/g, "\n").split("\n").map(line => line.split("\t").map(c => c.trim()));
}
function toRows(input) {
  return Array.isArray(input)
    ? input.map(r => r.map(c => String(c == null ? "" : c).trim()))
    : splitRows(input);
}
function parseAmount(s) {
  if (s == null) return NaN;
  s = String(s).trim().replace(/[$,]/g, "");
  if (/^\(.*\)$/.test(s)) s = "-" + s.slice(1, -1);
  if (s === "" || s === "-") return NaN;
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}
/* Same normalization as the workbook macro: numeric-looking → number, else upper-cased text */
function normRef(v) {
  const s = String(v == null ? "" : v).trim();
  if (s === "") return "";
  const n = Number(s.replace(/,/g, ""));
  return Number.isFinite(n) ? String(n) : s.toUpperCase();
}

/* CDK schedule export, columns A:F → control in col C (index 2), amount in col F (index 5). */
function parseSchedule(input) {
  const out = { rows: [], company: null };
  for (const cells of toRows(input)) {
    const m = cells.join(" ").match(/Company:\s*(\d+)/i);
    if (m) out.company = Number(m[1]);
    if (cells.length < 6) continue;
    const control = cells[2], amt = parseAmount(cells[5]);
    if (control === "" || /^control$/i.test(control) || !Number.isFinite(amt)) continue;
    out.rows.push({ control, moreInfo: cells[3] || "", days: cells[4] || "", amount: amt });
  }
  return out;
}

const MONTHS = ["january","february","march","april","may","june","july","august","september","october","november","december"];
function excelSerialToISO(n) {
  if (!Number.isFinite(n) || n < 30000 || n > 70000) return null;   // ~1982..2061
  const d = new Date(Date.UTC(1899, 11, 30) + Math.floor(n) * 86400000);
  return d.toISOString().slice(0, 10);
}
function parseDateToken(v) {
  if (v == null) return null;
  const s = String(v).trim();
  if (s === "") return null;
  if (/^\d+(\.\d+)?$/.test(s)) return excelSerialToISO(Number(s));
  let m = s.match(/^([A-Za-z]+)\.?\s+(\d{1,2}),?\s*(\d{4})$/);
  if (m) {
    const mo = MONTHS.findIndex(x => x.startsWith(m[1].toLowerCase()));
    if (mo >= 0) return `${m[3]}-${String(mo + 1).padStart(2, "0")}-${String(Number(m[2])).padStart(2, "0")}`;
  }
  m = s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})\b/);
  if (m) {
    let y = Number(m[3]); if (y < 100) y += 2000;
    const mo = Number(m[1]), dd = Number(m[2]);
    if (mo >= 1 && mo <= 12 && dd >= 1 && dd <= 31) return `${y}-${String(mo).padStart(2, "0")}-${String(dd).padStart(2, "0")}`;
  }

}

/* Processor report. Columns located by header names so extra/reordered columns are fine. */
function parseCC(input) {
  const rows = toRows(input);
  let hdr = -1, col = {};
  for (let i = 0; i < rows.length; i++) {
    const lower = rows[i].map(c => c.toLowerCase().trim());
    const iRef = lower.findIndex(c => c.replace(/\s/g, "") === "ro#/other");
    let iAmt = lower.indexOf("sale amount");
    if (iAmt < 0) iAmt = lower.indexOf("total");
    if (iAmt < 0) iAmt = lower.indexOf("amount");
    if (iRef >= 0 && iAmt >= 0) {
      hdr = i;
      col = { ref: iRef, amt: iAmt, name: lower.indexOf("name"), card: lower.indexOf("card"),
              op: lower.indexOf("operation"), dept: lower.indexOf("department"), date: lower.indexOf("date") };
      break;
    }
  }
  if (hdr < 0) return { error: 'Header row not found — expected a "RO#/Other" column plus an amount column ("Sale Amount", "Total" or "Amount").', rows: [] };
  let titleDate = null;
  for (let i = 0; i < hdr && !titleDate; i++)
    for (const cell of rows[i]) { const dt = parseDateToken(cell); if (dt) { titleDate = dt; break; } }
  const tally = new Map();
  const out = [];
  for (let i = hdr + 1; i < rows.length; i++) {
    const c = rows[i];
    const amt = parseAmount(c[col.amt]);
    if (!Number.isFinite(amt)) continue;
    if (col.date >= 0) { const dt = parseDateToken(c[col.date]); if (dt) tally.set(dt, (tally.get(dt) || 0) + 1); }
    out.push({
      ref: (c[col.ref] || "").trim(), amount: amt,
      name: col.name >= 0 ? (c[col.name] || "").trim() : "",
      card: col.card >= 0 ? (c[col.card] || "").trim() : "",
      op:   col.op   >= 0 ? (c[col.op]   || "").trim() : "",
      dept: col.dept >= 0 ? (c[col.dept] || "").trim() : "",
    });
  }
  let rowDate = null, best = 0;
  for (const [dt, n] of tally) if (n > best) { rowDate = dt; best = n; }
  return { rows: out, date: rowDate || titleDate };
}

/* Sum of Sale Amounts whose RO#/Other matches the control. */
function ccIndex(ccRows) {
  const idx = new Map();
  for (const r of ccRows) {
    const k = normRef(r.ref);
    if (k === "") continue;
    const e = idx.get(k) || { total: 0, cards: new Set() };
    e.total += r.amount;
    if (r.card) e.cards.add(r.card);
    idx.set(k, e);
  }
  return idx;
}

/* Received: explicit amount wins; else the CC match; else "received in full" → schedule amount. */
function receivedFor(row, onCC) {
  const m = parseAmount(row.manualAmt);
  if (Number.isFinite(m) && m !== 0) return m;
  if (Math.abs(onCC) > 0.004) return onCC;
  if (row.include) return row.amount;
  return 0;
}

/* CC refs not present among schedule controls. */
function unfoundMatch(schRows, ccRows) {
  const schSet = new Set(schRows.map(r => normRef(r.control)).filter(k => k !== ""));
  const out = [], skipped = [];
  for (const r of ccRows) {
    const k = normRef(r.ref);
    if (k === "") { skipped.push(r); continue; }
    if (!schSet.has(k)) out.push({ ref: r.ref, amount: r.amount, note: noteFor(r), category: "" });
  }
  return { rows: out, skipped };
}
function noteFor(ccRow) { return [ccRow.card, ccRow.name].filter(Boolean).join(" · "); }

const r2 = v => Math.round(v * 100) / 100;
const cents = v => Math.round(v * 100);
function money(v) { return (Math.abs(v) < 0.005 ? 0 : v).toFixed(2); }
function fmtUSD(v) { const n = Math.abs(v) < 0.005 ? 0 : v; return (n < 0 ? "−$" : "$") + Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function mmdd(dateStr)   { return dateStr ? dateStr.slice(5, 7) + dateStr.slice(8, 10) : "????"; }
function mmddyy(dateStr) { return dateStr ? mmdd(dateStr) + dateStr.slice(2, 4) : "??????"; }
function fmtMDY(iso) { return iso ? `${iso.slice(5, 7)}/${iso.slice(8, 10)}/${iso.slice(2, 4)}` : ""; }

/* Donations: round-up to the next whole dollar, or a custom amount typed at the terminal. */
function donationCandidate(row, onCC) {
  if (String(row.manualAmt || "").trim() !== "") return 0;
  const diff = r2(onCC - row.amount);
  return diff > 0.004 ? diff : 0;
}
function isRoundUp(row, onCC) {
  const diff = r2(onCC - row.amount);
  return diff > 0.004 && diff < 1 && cents(onCC) % 100 === 0;
}
function donationFor(row, onCC) {
  if (!row.donate || String(row.manualAmt || "").trim() !== "") return 0;
  const diff = r2(onCC - row.amount);
  return diff > 0.004 ? diff : 0;
}

/* Full posting in the same order as the workbook's POST macro. */
function buildPosting(state, store) {
  const co = state.co, lines = [];
  const add = (acct, amt, control, control2, desc) =>
    lines.push({ co, acct: String(acct), amt: r2(amt), control: String(control || ""), control2: String(control2 || ""), desc: String(desc || "") });

  for (const d of store.deposits) {
    const amt = parseAmount(state.deposits[d.type]);
    if (Number.isFinite(amt) && amt !== 0)
      add(d.acct, amt, d.prefix + mmdd(state.cashDate), "", d.type);
  }
  const idx = ccIndex(state.cc);
  for (const row of state.schedule) {
    const onCC = (idx.get(normRef(row.control)) || { total: 0 }).total;
    const rec = receivedFor(row, onCC);
    if (rec === 0) continue;
    const donation = donationFor(row, onCC);
    if (donation > 0) {
      const dAcct = store.donation || store.clearing;
      const dCtrl = store.donationControl || "DONATION";
      add(store.clearing, -(rec - donation), row.control, "", "");
      add(dAcct, -donation, dCtrl, "", isRoundUp(row, onCC) ? "ROUND UP DONATION" : "CUSTOMER DONATION");
    } else {
      add(store.clearing, -rec, row.control, "", "");
    }
  }
  for (const n of state.notOnSchedule) {
    const amt = parseAmount(n.amount);
    if (n.ref && Number.isFinite(amt) && amt !== 0)
      add(nosAccount(store, n.category), -amt, n.ref, "", n.note || "");
  }
  return lines;
}
/* AGJE paste string — identical shape to the workbook: Co.Acct.Cents.Control.Control2.Description.Count */
function jeStrings(lines) {
  return lines.map(l => [l.co, l.acct, cents(l.amt), l.control, l.control2, l.desc, ""].join("."));
}
function totals(state, store) {
  let dep = 0;
  for (const d of store.deposits) {
    const a = parseAmount(state.deposits[d.type]);
    if (Number.isFinite(a)) dep += a;
  }
  const idx = ccIndex(state.cc);
  let rec = 0;
  for (const row of state.schedule)
    rec += receivedFor(row, (idx.get(normRef(row.control)) || { total: 0 }).total);
  for (const n of state.notOnSchedule) {
    const a = parseAmount(n.amount);
    if (n.ref && Number.isFinite(a)) rec += a;
  }
  return { deposit: r2(dep), received: r2(rec), variance: r2(dep - rec) };
}

function csvRows(t) {
  return t.replace(/\r\n?/g, "\n").split("\n").map(line => {
    const cells = []; let cur = "", q = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];

      else if (ch === '"') q = true;

  static LS_KEY = "ccr_store_config_v1";

  E = null; d = null; cfg = null; usingCustom = false;
  ui = { tab: "needs", open: {}, setupOpen: false, copyLabel: "Copy AGJE lines", handled: {} };
  su = null; suSel = 0;
  lastPosting = null; generated = false;
  schMsg = null; ccErr = null; seq = 0; skipped = [];

  mount() {
    this.E = E;
    let cfg = Component.DEFAULTS, custom = false;
    try { const s = localStorage.getItem(Component.LS_KEY); if (s) { cfg = JSON.parse(s); custom = true; } } catch (e) {}
    this.cfg = E.sanitizeConfig(cfg);
    if (!this.cfg.stores.length) { this.cfg = E.sanitizeConfig(Component.DEFAULTS); custom = false; }
    this.usingCustom = custom;
    this.d = {
      co: this.cfg.stores[0].co,
      cashDate: new Date().toISOString().slice(0, 10),
      dateManual: false, deposits: {}, schedule: [], ccFiles: [], cc: [],
      notOnSchedule: [], signName: "", signChecked: false,
    };
    this.schRef = { current: null }; this.ccRef = { current: null };
    this.sesRef = { current: null }; this.cfgRef = { current: null };
    this.refresh();
  }

  refresh = () => this.render();
  render() { renderApp(this.renderVals()); }
  store() {
    return this.cfg.stores.find(s => s.co === this.d.co) || this.cfg.stores[0] ||
      { co: 0, name: "?", clearing: "", donation: "", donationControl: "", deposits: [], nosCats: [] };
  }
  cleanupForStore() {
    const d = this.d, store = this.store();
    const valid = new Set(store.deposits.map(x => x.type));
    for (const k of Object.keys(d.deposits)) if (!valid.has(k)) delete d.deposits[k];
    const cats = new Set(store.nosCats.map(c => c.label));
    for (const n of d.notOnSchedule) if (n.category && !cats.has(n.category)) n.category = "";
  }

  /* ---------- imports ---------- */
  loadSchedule(rows, name) {
    const E = this.E, d = this.d;
    const p = E.parseSchedule(rows);
    d.schedule = p.rows.map(r => ({ ...r, include: false, manualAmt: "", donate: false, donNo: false }));
    this.generated = false; this.lastPosting = null;
    const src = name ? ` (${name})` : "";
    if (p.company && this.cfg.stores.some(s => s.co === p.company)) {
      d.co = p.company; this.cleanupForStore();
      this.schMsg = { text: `${p.rows.length} schedule items loaded${src} · store auto-detected: CO${p.company}`, cls: "ok" };
    } else {
      this.schMsg = p.rows.length
        ? { text: `${p.rows.length} schedule items loaded${src}.`, cls: "ok" }
        : { text: "No schedule rows recognized (need columns A:F with Control in column C).", cls: "err" };
    }
    this.recomputeNos();
  }
  addCC(rows, name) {
    const E = this.E, d = this.d;
    const p = E.parseCC(rows);
    if (p.error) { this.ccErr = `${name || "file"}: ${p.error}`; return; }
    this.ccErr = null;
    const nm = name || `file ${d.ccFiles.length + 1}`;
    const i = d.ccFiles.findIndex(f => f.name === nm);
    if (i >= 0) d.ccFiles[i] = { name: nm, rows: p.rows, date: p.date };
    else d.ccFiles.push({ name: nm, rows: p.rows, date: p.date });
    if (p.date && !d.dateManual && d.cashDate !== p.date) d.cashDate = p.date;
    this.rebuildCC();
  }
  rebuildCC() {
    const d = this.d;
    d.cc = d.ccFiles.flatMap(f => f.rows);
    this.generated = false;
    this.recomputeNos();
  }
  /* Auto unfound-match: merge so user edits and manual rows survive re-runs. */
  recomputeNos() {
    const E = this.E, d = this.d;
    if (!d.schedule.length || !d.cc.length) {
      this.skipped = [];
      d.notOnSchedule = d.notOnSchedule.filter(n => n.manual);
      return;
    }
    const res = E.unfoundMatch(d.schedule, d.cc);
    this.skipped = res.skipped;
    const prev = d.notOnSchedule;
    const manuals = prev.filter(n => n.manual);
    const manualRefs = new Set(manuals.map(n => E.normRef(n.ref)).filter(k => k !== ""));
    const next = [];
    for (const r of res.rows) {
      const k = "a:" + E.normRef(r.ref);
      if (manualRefs.has(E.normRef(r.ref))) continue;
      const old = prev.find(p => !p.manual && p.key === k);
      next.push(old || { ...r, key: k });
    }
    d.notOnSchedule = [...next, ...manuals];
  }
  handleFiles = async (files, kind) => {
    const list = [...(files || [])].filter(Boolean);
    for (const f of (kind === "sch" ? list.slice(0, 1) : list)) {
      try {
        const rows = await this.E.fileToRows(f);
        if (kind === "sch") this.loadSchedule(rows, f.name); else this.addCC(rows, f.name);
      } catch (err) { alert(`${f.name}: ${err.message}`); }
    }
    this.refresh();
  };

  goSection(n) {
    this.ui.open[n] = true; this.refresh();
    setTimeout(() => {
      const el = document.getElementById("sec" + n);
      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 14, behavior: "smooth" });
    }, 60);
  }

  download(name, data, mime) {
    const blob = data instanceof Blob ? data : new Blob([data], { type: mime || "text/plain" });
    const a = document.createElement("a");

  fileStem() { return `CASHDEPOSIT-${this.E.mmddyy(this.d.cashDate)}-CO${this.d.co}`; }

    if (!String(d.signName || "").trim() && !confirm('No name entered under "Reconciled by". Generate anyway?')) return;
    this.lastPosting = E.buildPosting(d, this.store());

    const E = this.E;

  recordData() {
    const E = this.E, d = this.d, store = this.store();
    const idx = E.ccIndex(d.cc), t = E.totals(d, store);
    const sch = d.schedule.map(row => {
      const e = idx.get(E.normRef(row.control));
      const onCC = e ? E.r2(e.total) : 0;
      const rec = E.receivedFor(row, onCC);
      const donation = E.donationFor(row, onCC);
      let how = "";
      if (rec === 0) how = "";
      else if (E.parseAmount(row.manualAmt) && E.parseAmount(row.manualAmt) !== 0) how = "manual amount";
      else if (row.include && onCC === 0) how = "received in full";
      else if (onCC !== 0) how = donation > 0 ? `on CC (incl. ${E.money(donation)} ${E.isRoundUp(row, onCC) ? "round-up" : "customer"} donation)` : "on CC";
      return { ...row, onCC, card: e ? [...e.cards].join(", ") : "", receivedAmt: rec, donation, how };
    });
    return { sch, t, store, posting: this.lastPosting || E.buildPosting(d, store) };
  }

  onXlsx = async () => {

  /* ---------- session ---------- */
  onSaveSession = () => this.download(this.fileStem() + "-session.json", JSON.stringify(this.d, null, 1), "application/json");

  onSesFile = e => {
    const f = e.target.files[0]; e.target.value = "";
    if (!f) return;
    f.text().then(t => {
      try {
        const E = this.E, s = JSON.parse(t);
        delete s.balfwd;
        if (Array.isArray(s.schedule)) s.schedule = s.schedule.map(r => {
          if ("include" in r || "manualAmt" in r) return { donate: false, donNo: false, ...r };
          const recv = String(r.received == null ? "" : r.received).trim();
          return { control: r.control, moreInfo: r.moreInfo, days: r.days, amount: r.amount,
                   include: /^y$/i.test(recv), manualAmt: /^y$/i.test(recv) ? "" : recv, donate: false, donNo: false };
        });
        if (Array.isArray(s.notOnSchedule)) s.notOnSchedule = s.notOnSchedule.map(n => ({ category: "", ...n, manual: true, key: "m" + (++this.seq) }));
        if (!Array.isArray(s.ccFiles)) s.ccFiles = (Array.isArray(s.cc) && s.cc.length) ? [{ name: "restored session data", rows: s.cc }] : [];
        Object.assign(this.d, s);
        if (!this.cfg.stores.some(x => x.co === this.d.co)) this.d.co = this.cfg.stores[0].co;
        this.d.cc = this.d.ccFiles.flatMap(x => x.rows);
        this.generated = false; this.lastPosting = null;
        this.schMsg = { text: `${this.d.schedule.length} schedule items restored from session.`, cls: this.d.schedule.length ? "ok" : "" };
        this.recomputeNos();

      } catch (err) { alert("Could not read session file: " + err.message); }

  /* ---------- setup ---------- */
  openSetup = () => {
    this.su = JSON.parse(JSON.stringify(this.cfg));
    this.suSel = Math.max(0, this.su.stores.findIndex(s => s.co === this.d.co));
    this.ui.setupOpen = true; this.refresh();
  };
  closeSetup = () => { this.ui.setupOpen = false; this.su = null; this.refresh(); };
  validateSetup(cfg) {
    const c = this.E.sanitizeConfig(cfg);
    if (!c.stores.length) return "At least one store is required.";
    const cos = c.stores.map(s => s.co);
    if (new Set(cos).size !== cos.length) return "Duplicate Co numbers — each store needs a unique Co #.";
    for (const s of c.stores) {
      if (!s.clearing) return `CO${s.co}: schedule clearing account is required.`;
      if (!s.deposits.length) return `CO${s.co}: at least one deposit type is required.`;
      for (const x of s.deposits) if (!x.acct || !x.prefix) return `CO${s.co}: deposit type "${x.type}" needs an account and a control prefix.`;
      for (const x of s.nosCats) if (!x.acct) return `CO${s.co}: category "${x.label}" needs an account.`;
    }
    return null;
  }
  applySetup() {
    const err = this.validateSetup(this.su);
    if (err) { alert(err); return false; }
    this.cfg = this.E.sanitizeConfig(this.su);
    this.usingCustom = true;
    try { localStorage.setItem(Component.LS_KEY, JSON.stringify(this.cfg)); }
    catch (e) { alert("Settings applied for this session, but could not be saved in this browser (storage unavailable). Use Export settings to keep them."); }
    if (!this.cfg.stores.some(s => s.co === this.d.co)) this.d.co = this.cfg.stores[0].co;
    this.cleanupForStore();
    return true;
  }
  onSetupApply = () => { if (this.applySetup()) this.closeSetup(); };
  onSetupReset = () => {
    if (!confirm("Discard all customizations and go back to the built-in defaults?")) return;
    try { localStorage.removeItem(Component.LS_KEY); } catch (e) {}
    this.usingCustom = false;
    this.cfg = this.E.sanitizeConfig(Component.DEFAULTS);
    if (!this.cfg.stores.some(s => s.co === this.d.co)) this.d.co = this.cfg.stores[0].co;
    this.cleanupForStore();
    this.closeSetup();
  };
  onSetupExport = () => {
    const err = this.validateSetup(this.su);
    if (err) { alert(err); return; }
    this.download("deposit-reconciliation-settings.json", JSON.stringify(this.E.sanitizeConfig(this.su), null, 1), "application/json");
  };
  onCfgFile = e => {
    const f = e.target.files[0]; e.target.value = "";

        const c = this.E.sanitizeConfig(JSON.parse(t));

    });

  /* ---------- renderVals ---------- */
  renderVals() {
    if (!this.E || !this.d) return { ready: false, notReady: true };
    const E = this.E, d = this.d, store = this.store(), ui = this.ui;
    const MONO = "'IBM Plex Mono',monospace";
    const t = E.totals(d, store);
    const varOK = Math.abs(t.variance) < 0.005;
    const depTot = t.deposit;

    /* schedule view models */
    const idx = E.ccIndex(d.cc);
    let recTot = 0, autoN = 0, manN = 0, donN = 0, donSum = 0;
    const allRows = d.schedule.map((row, i) => {
      const e = idx.get(E.normRef(row.control));
      const onCC = e ? E.r2(e.total) : 0;
      const cards = e ? [...e.cards].join(", ") : "";
      const rec = E.receivedFor(row, onCC);
      recTot += rec;
      const cand = onCC !== 0 ? E.donationCandidate(row, onCC) : 0;
      const donPending = cand > 0 && !row.donate && !row.donNo;
      const donAmt = onCC !== 0 ? E.donationFor(row, onCC) : 0;
      const hasCC = onCC !== 0;
      const needs = (!hasCC && rec === 0) || donPending;
      if (rec !== 0) { if (hasCC) autoN++; else manN++; }
      if (donAmt > 0) { donN++; donSum += donAmt; }
      const days = Number(row.days) || 0;
      return {
        control: row.control, moreInfo: row.moreInfo, days: String(row.days || ""),
        daysStyle: days > 2
          ? { background: "#FAE9E5", border: "1px solid #F0C9C0", color: "#A63A24", borderRadius: 9, padding: "1px 8px", fontSize: 11.5, fontWeight: 700 }
          : { color: "#8294A6", fontSize: 12.5 },
        owed: E.money(row.amount),
        hasCC, noCC: !hasCC, found: hasCC ? "$" + E.money(onCC) : "", cards,
        donPending, donQuestion: `+$${E.money(cand)} ${E.isRoundUp(row, onCC) ? "round-up" : "over"} — donation?`,
        donYes: row.donate && donAmt > 0,
        donChip: `$${E.money(donAmt)} donation ✓`,
        onDonYes: () => { row.donate = true; row.donNo = false; this.generated = false; this.refresh(); },
        onDonNo: () => { row.donNo = true; row.donate = false; this.generated = false; this.refresh(); },
        onDonUndo: () => { row.donate = false; row.donNo = false; this.generated = false; this.refresh(); },
        incLabel: row.include ? "✓ Received in full" : "Received in full",
        incStyle: row.include
          ? { background: "#1E7A4C", border: "1.5px solid #1E7A4C", color: "#fff", borderRadius: 7, padding: "7px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }
          : { background: "#fff", border: "1.5px solid #1E7A4C", color: "#1E7A4C", borderRadius: 7, padding: "7px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" },
        onInc: () => { row.include = !row.include; this.generated = false; this.refresh(); },
        manualAmt: row.manualAmt, manPlaceholder: hasCC ? "adjust $" : "or exact $",
        onMan: ev => { row.manualAmt = ev.target.value; this.generated = false; this.refresh(); },
        recCell: rec ? E.money(rec) : "—",
        needs,
        rowStyle: {
          display: "grid", gridTemplateColumns: "150px 64px 105px 175px 1fr 115px", gap: 14,
          alignItems: "center", padding: "10px 18px", borderBottom: "1px solid #EDF1F5",
          background: donPending ? "#FDF8EC" : (rec !== 0 ? "#F6FBF8" : "#fff"),
        },
      };
    });
    const needsRows = allRows.filter(r => r.needs);
    const doneRows = allRows.filter(r => !r.needs);
    const schedRows = ui.tab === "needs" ? needsRows : ui.tab === "done" ? doneRows : allRows;

    /* skipped (blank-ref) rows, minus ones already added */
    const handled = { ...ui.handled };
    const skippedRows = [];
    for (const r of (this.skipped || [])) {
      const sig = `${r.amount}|${r.name}|${r.card}`;
      if (handled[sig] > 0) { handled[sig]--; continue; }
      skippedRows.push({
        amt: "$" + E.money(r.amount),
        desc: [r.card, r.name || "(no name)", r.dept].filter(Boolean).join(" · "),
        onAdd: () => {
          ui.handled[sig] = (ui.handled[sig] || 0) + 1;
          d.notOnSchedule.push({ ref: "", amount: String(r.amount), note: E.noteFor(r), category: "", manual: true, key: "m" + (++this.seq) });
          this.generated = false; this.refresh();
        },
      });
    }

    /* not-on-schedule view models */
    const hasCats = store.nosCats.length > 0;
    const catOpts = [{ v: "", label: `Schedule clearing (${store.clearing})` }]
      .concat(store.nosCats.map(c => ({ v: c.label, label: `${c.label} → ${c.acct}` })));
    const nosRows = d.notOnSchedule.map((n, i) => ({
      ref: n.ref,
      refStyle: {
        border: n.ref ? "1.5px solid #DCE3EA" : "1.5px solid #E4C887", background: n.ref ? "#fff" : "#FDF8EC",
        borderRadius: 7, padding: "7px 9px", fontFamily: MONO, fontSize: 12.5, width: "100%", boxSizing: "border-box",
      },
      onRef: ev => { n.ref = ev.target.value; this.generated = false; this.refresh(); },
      onRefBlur: () => {
        const m = E.ccIndex(d.cc).get(E.normRef(n.ref));
        if (m) { n.amount = String(E.r2(m.total)); n.note = [...m.cards].join(", "); this.refresh(); }
      },
      amount: String(n.amount == null ? "" : n.amount),
      onAmt: ev => { n.amount = ev.target.value; this.generated = false; this.refresh(); },
      hasCats, noCats: !hasCats, catVal: n.category || "", catOpts,
      onCat: ev => { n.category = ev.target.value; this.generated = false; this.refresh(); },
      note: n.note || "",
      onNote: ev => { n.note = ev.target.value; this.refresh(); },
      acct: E.nosAccount(store, n.category),
      onDel: () => { d.notOnSchedule.splice(i, 1); this.generated = false; this.refresh(); },
    }));
    const ran = d.schedule.length > 0 && d.cc.length > 0;
    const nosAttention = skippedRows.length + d.notOnSchedule.filter(n => !String(n.ref || "").trim()).length;

    /* step statuses */
    const step1done = d.schedule.length > 0 && d.ccFiles.length > 0;
    const step2done = depTot > 0;
    const needsCount = needsRows.length;
    const open1 = ui.open[1] != null ? ui.open[1] : true;
    const open2 = ui.open[2] != null ? ui.open[2] : true;

    /* rail */
    const icoBase = { width: 24, height: 24, borderRadius: "50%", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 };
    const rowBase = { display: "flex", alignItems: "center", gap: 11, padding: "10px 12px", borderRadius: 9, cursor: "pointer" };
    const railItem = (n, title, sub, state, count) => {
      let icon = String(n), iconStyle, rowStyle = { ...rowBase }, subStyle = { color: "#9FB3C6", fontSize: 11.5 };
      if (state === "done") { icon = "✓"; iconStyle = { ...icoBase, background: "#2E9E63", color: "#fff" }; }
      else if (state === "work") { icon = count != null && count > 0 ? String(count) : "!"; iconStyle = { ...icoBase, background: "#E8B64C", color: "#1C3D5A", fontSize: 12 }; rowStyle.background = "rgba(255,255,255,.12)"; subStyle = { color: "#F2D9A0", fontSize: 11.5, fontWeight: 600 }; }
      else if (state === "alert") { icon = "!"; iconStyle = { ...icoBase, background: "#C2452D", color: "#fff" }; rowStyle.background = "rgba(194,69,45,.25)"; subStyle = { color: "#F4B8A8", fontSize: 11.5, fontWeight: 600 }; }
      else if (state === "lock") { icon = "🔒"; iconStyle = { ...icoBase, border: "1.5px solid #9FB3C6", color: "#9FB3C6", fontSize: 11 }; rowStyle.opacity = .55; }
      else if (state === "ready") { iconStyle = { ...icoBase, border: "1.5px solid #ffffff", color: "#ffffff" }; }
      else { iconStyle = { ...icoBase, border: "1.5px solid #9FB3C6", color: "#C5D2DE" }; rowStyle.opacity = .8; }
      return { title, sub, icon, iconStyle, rowStyle, subStyle, onClick: () => this.goSection(n) };
    };
    const sub1 = step1done ? `${d.ccFiles.length} file(s) · ${d.cc.length} transactions`
      : d.schedule.length ? "processor reports still needed"
      : d.ccFiles.length ? "CDK schedule still needed" : "waiting for files";
    const sub3 = !d.schedule.length ? "waiting for the schedule"
      : needsCount > 0 ? `${needsCount} not matched · ${E.fmtUSD(recTot)} received`
      : `all answered · ${E.fmtUSD(recTot)} received`;
    const state4 = !ran ? "idle" : nosAttention > 0 ? "alert" : "done";
    const sub4 = !ran ? "runs automatically after import"
      : nosAttention > 0 ? `${nosAttention} need a reference #`
      : `checked automatically · ${d.notOnSchedule.length} found`;
    const locked5 = !(d.schedule.length > 0 && depTot > 0);
    const lockMsg = !d.schedule.length ? "import the files first" : "enter the deposit totals first";
    const state5 = locked5 ? "lock" : this.generated ? "done" : "ready";
    const sub5 = locked5 ? "locked" : this.generated ? `posting generated · JE# DD${E.mmddyy(d.cashDate)}` : varOK ? "balanced — ready to post" : "post when variance is 0.00";

    const railItems = [
      railItem(1, "Import files", sub1, step1done ? "done" : (d.schedule.length || d.ccFiles.length ? "work" : "idle")),
      railItem(2, "Deposit totals", step2done ? E.fmtUSD(depTot) : "enter the drawer totals", step2done ? "done" : "idle"),
      railItem(3, "Check the schedule", sub3, !d.schedule.length ? "idle" : needsCount > 0 ? "work" : "done", needsCount),
      railItem(4, "Anything missing?", sub4, state4, nosAttention),
      railItem(5, "Review & post", sub5, state5),
    ];

    /* import statuses */
    const stBase = { fontSize: 12, fontWeight: 600, minHeight: 17 };
    const stStyle = cls => ({ ...stBase, color: cls === "ok" ? "#1E7A4C" : cls === "err" ? "#B3362A" : "#8294A6" });
    const schStatus = this.schMsg ? this.schMsg.text : "Nothing loaded yet.";
    const schCls = this.schMsg ? this.schMsg.cls : "";
    let ccStatus, ccCls;
    if (this.ccErr) { ccStatus = this.ccErr; ccCls = "err"; }
    else if (!d.ccFiles.length) { ccStatus = "Nothing loaded yet."; ccCls = ""; }
    else {
      const blank = d.cc.filter(r => E.normRef(r.ref) === "").length;
      const dates = [...new Set(d.ccFiles.map(f => f.date).filter(Boolean))];
      ccStatus = `${d.ccFiles.length} file(s) · ${d.cc.length} transactions · total ${E.money(d.cc.reduce((a, r) => a + r.amount, 0))}`
        + (blank ? ` · ⚠ ${blank} blank RO#/Other` : "")
        + (dates.length > 1 ? ` · ⚠ files have different dates (${dates.map(E.fmtMDY).join(", ")})` : "");
      ccCls = "ok";
    }

    /* recap */
    const mark = ok => ({ mark: ok ? "✓" : "⚠", markStyle: { color: ok ? "#1E7A4C" : "#A63A24", fontWeight: 700, flexShrink: 0 } });
    const depParts = store.deposits.filter(x => E.parseAmount(d.deposits[x.type]))
      .map(x => `${x.type} ${E.fmtUSD(E.parseAmount(d.deposits[x.type]))}`);
    const nosAccts = [...new Set(d.notOnSchedule.filter(n => n.ref).map(n => E.nosAccount(store, n.category)))];
    const recapLines = [
      { t: `${d.ccFiles.length} report file(s) imported — ${d.cc.length} card, cash & check transactions against ${d.schedule.length} schedule items`, ...mark(true) },
      { t: `Deposits entered: ${depParts.join(" · ") || "none"} — total ${E.fmtUSD(depTot)}`, ...mark(depTot > 0) },
      { t: `Schedule: ${autoN} matched automatically · ${manN} marked received${donN ? ` · ${donN} donation(s) totalling ${E.fmtUSD(donSum)}` : ""}`, ...mark(true) },
      { t: d.notOnSchedule.length
          ? `Not on schedule: ${d.notOnSchedule.length} payment(s) posting to ${nosAccts.join(", ") || store.clearing}`
          : "Not on schedule: nothing — every processor payment is on the books", ...mark(true) },
    ];
    if (needsCount > 0) recapLines.push({ t: `${needsCount} schedule item(s) had no card match and no answer — they stay on the schedule for tomorrow`, ...mark(true) });
    if (nosAttention > 0) recapLines.push({ t: `${nosAttention} item(s) in step 4 still need a reference number before posting`, ...mark(false) });
    if (!varOK) recapLines.push({ t: `Variance is ${E.fmtUSD(t.variance)} — it should be $0.00 before posting`, ...mark(false) });

    /* posting view */
    const jeBal = this.lastPosting ? E.r2(this.lastPosting.reduce((a, l) => a + l.amt, 0)) : 0;
    const jeRows = (this.lastPosting || []).map(l => ({
      co: String(l.co), acct: l.acct, amt: E.money(l.amt),
      ctrl: [l.control, l.control2, l.desc].filter(Boolean).join(" · "),
    }));

    /* tabs */
    const tabBase = { borderRadius: 16, padding: "6px 14px", fontSize: 12.5, cursor: "pointer" };
    const tabOn = { ...tabBase, background: "#FBF1DC", border: "1.5px solid #E4C887", fontWeight: 700, color: "#7A540E" };
    const tabOff = { ...tabBase, background: "#fff", border: "1px solid #DCE3EA", fontWeight: 600, color: "#5A6B7E" };
    const tabOnN = { ...tabBase, background: "#1C3D5A", border: "1.5px solid #1C3D5A", fontWeight: 700, color: "#fff" };

    const logoSrcs = Component.LOGOS[d.co] || [];

    /* setup vm */
    let suVals = {};
    if (ui.setupOpen && this.su) {
      const sel = Math.min(this.suSel, this.su.stores.length - 1);
      const s = this.su.stores[sel];
      suVals = {
        suStores: this.su.stores.map((x, i) => ({
          label: `CO${x.co} — ${x.name || "(unnamed)"}`,
          style: i === sel
            ? { padding: "9px 12px", cursor: "pointer", borderBottom: "1px solid #EDF1F5", fontSize: 13, background: "#1C3D5A", color: "#fff", fontWeight: 600 }
            : { padding: "9px 12px", cursor: "pointer", borderBottom: "1px solid #EDF1F5", fontSize: 13 },
          onSel: () => { this.suSel = i; this.refresh(); },
        })),
        hasSuStore: !!s,
        suCo: s ? String(s.co) : "", onSuCo: ev => { s.co = Number(ev.target.value) || s.co; this.refresh(); },
        suName: s ? s.name : "", onSuName: ev => { s.name = ev.target.value; this.refresh(); },
        suClearing: s ? s.clearing : "", onSuClearing: ev => { s.clearing = ev.target.value.trim(); this.refresh(); },
        suDonation: s ? (s.donation || "") : "", onSuDonation: ev => { s.donation = ev.target.value.trim(); this.refresh(); },
        suDonCtrl: s ? (s.donationControl || "") : "", onSuDonCtrl: ev => { s.donationControl = ev.target.value.trim(); this.refresh(); },
        suDeps: s ? s.deposits.map((x, i) => ({
          type: x.type, acct: x.acct, prefix: x.prefix,
          onType: ev => { x.type = ev.target.value.toUpperCase(); this.refresh(); },
          onAcct: ev => { x.acct = ev.target.value.trim(); this.refresh(); },
          onPrefix: ev => { x.prefix = ev.target.value.trim().toUpperCase(); this.refresh(); },
          onDel: () => { s.deposits.splice(i, 1); this.refresh(); },
        })) : [],
        onAddDep: () => { s.deposits.push({ type: "", acct: "", prefix: "" }); this.refresh(); },
        suCats: s ? s.nosCats.map((x, i) => ({
          label: x.label, acct: x.acct,
          onLabel: ev => { x.label = ev.target.value.toUpperCase(); this.refresh(); },
          onAcct: ev => { x.acct = ev.target.value.trim(); this.refresh(); },
          onDel: () => { s.nosCats.splice(i, 1); this.refresh(); },
        })) : [],
        onAddCat: () => { s.nosCats.push({ label: "", acct: "" }); this.refresh(); },
        onAddStore: () => {
          const used = new Set(this.su.stores.map(x => x.co));
          let co = 1; while (used.has(co)) co++;
          this.su.stores.push({ co, name: "New store", clearing: "", donation: "", donationControl: "",
            deposits: [{ type: "CASH", acct: "", prefix: "CA" }, { type: "CREDIT", acct: "", prefix: "CR" }, { type: "CHECK", acct: "", prefix: "CK" }],
            nosCats: [] });
          this.suSel = this.su.stores.length - 1; this.refresh();
        },
        onDelStore: () => {
          if (!s) return;
          if (this.su.stores.length === 1) { alert("At least one store is required."); return; }
          if (!confirm(`Remove CO${s.co} — ${s.name}?`)) return;
          this.su.stores.splice(sel, 1); this.suSel = Math.max(0, sel - 1); this.refresh();
        },
      };
    }

    return {
      ready: true, notReady: false,
      logos: logoSrcs.map(src => ({ src })), noLogo: logoSrcs.length === 0,
      storeName: store.name, coStr: String(d.co),
      onStoreSel: ev => { d.co = Number(ev.target.value); this.generated = false; this.cleanupForStore(); this.refresh(); },
      storeOpts: this.cfg.stores.map(s => ({ v: String(s.co), label: `CO${s.co} — ${s.name}` })),
      cashDate: d.cashDate,
      onDateChange: ev => { d.cashDate = ev.target.value; d.dateManual = true; this.generated = false; this.refresh(); },
      railItems,
      depStr: E.fmtUSD(t.deposit), recStr: E.fmtUSD(t.received),
      varStr: E.fmtUSD(t.variance),
      varStyle: { fontFamily: MONO, fontSize: 20, fontWeight: 600, color: varOK && depTot > 0 ? "#7FE0A8" : "#F4A28E" },
      varNote: varOK && depTot > 0 ? "Balanced — ready to post ✓" : "must reach $0.00 before posting",
      onSaveSession: this.onSaveSession, onLoadSessionClick: this.onLoadSessionClick,
      onOpenSetup: this.openSetup, setupLabel: this.usingCustom ? "⚙ Setup •" : "⚙ Setup",
      headerSub: `CO${d.co} · ${store.name} · cash date ${E.fmtMDY(d.cashDate)}`,
      scanChip: step1done,
      /* section 1 */
      open1, closed1: !open1,
      onToggle1: () => { ui.open[1] = !open1; this.refresh(); },
      sum1: `schedule (${d.schedule.length} items) + ${d.ccFiles.length} report file(s) · ${d.cc.length} transactions`,
      onSchDragOver: ev => ev.preventDefault(),
      onSchDrop: ev => { ev.preventDefault(); this.handleFiles(ev.dataTransfer.files, "sch"); },
      onPickSch: () => this.schRef.current && this.schRef.current.click(),
      onSchFile: ev => { const fs = ev.target.files; this.handleFiles(fs, "sch"); ev.target.value = ""; },
      schStatus, schStatusStyle: stStyle(schCls),
      onCCDragOver: ev => ev.preventDefault(),
      onCCDrop: ev => { ev.preventDefault(); this.handleFiles(ev.dataTransfer.files, "cc"); },
      onPickCC: () => this.ccRef.current && this.ccRef.current.click(),
      onCCFile: ev => { const fs = ev.target.files; this.handleFiles(fs, "cc"); ev.target.value = ""; },
      ccStatus, ccStatusStyle: stStyle(ccCls),
      hasCCChips: d.ccFiles.length > 0,
      ccChips: d.ccFiles.map((f, i) => ({
        name: f.name,
        meta: `${f.rows.length} txn · ${E.money(f.rows.reduce((a, r) => a + r.amount, 0))}${f.date ? " · " + E.fmtMDY(f.date) : ""}`,
        onRemove: ev => { ev.stopPropagation(); d.ccFiles.splice(i, 1); this.rebuildCC(); this.refresh(); },
      })),
      onSample: this.onSample,
      /* section 2 */
      open2, closed2: !open2,
      onToggle2: () => { ui.open[2] = !open2; this.refresh(); },
      sum2: depParts.length ? `${depParts.join(" · ")} — total ${E.fmtUSD(depTot)}` : "nothing entered",
      depHint: `${store.name} accounts.`,
      depRows: store.deposits.map(x => ({
        type: x.type, acct: x.acct, control: x.prefix + E.mmdd(d.cashDate),
        val: d.deposits[x.type] || "",
        onChange: ev => { d.deposits[x.type] = ev.target.value; this.generated = false; this.refresh(); },
      })),
      depTotStr: E.fmtUSD(depTot),
      /* section 3 */
      schedEmpty: d.schedule.length === 0, schedLoaded: d.schedule.length > 0,
      tabNeedsStyle: ui.tab === "needs" ? tabOn : tabOff,
      tabDoneStyle: ui.tab === "done" ? tabOnN : tabOff,
      tabAllStyle: ui.tab === "all" ? tabOnN : tabOff,
      onTabNeeds: () => { ui.tab = "needs"; this.refresh(); },
      onTabDone: () => { ui.tab = "done"; this.refresh(); },
      onTabAll: () => { ui.tab = "all"; this.refresh(); },
      needsCount, doneCount: doneRows.length, allCount: allRows.length,
      schedRecTot: E.fmtUSD(recTot),
      schedRows,
      needsEmpty: d.schedule.length > 0 && schedRows.length === 0,
      /* section 4 */
      nosHint: hasCats
        ? `Card payments that aren't on the schedule, found automatically. Pick a category to route each posting (default = clearing ${store.clearing}) and fix any wrong reference number.`
        : `Card payments that aren't on the schedule, found automatically. They post to clearing ${store.clearing} — just fix any wrong reference number.`,
      nosRanChip: ran,
      hasSkipped: skippedRows.length > 0,
      skippedTitle: `${skippedRows.length} payment(s) have no RO#/Other on them — they can't be matched automatically. Add each one and type its reference:`,
      skippedRows,
      nosWaiting: !ran,
      nosAllGood: ran && d.notOnSchedule.length === 0 && skippedRows.length === 0,
      hasNos: d.notOnSchedule.length > 0,
      nosCatHdr: hasCats ? "CATEGORY" : "POSTS TO",
      nosRows,
      onAddNos: () => { d.notOnSchedule.push({ ref: "", amount: "", note: "", category: "", manual: true, key: "m" + (++this.seq) }); this.refresh(); },
      /* section 5 */
      locked5, lockMsg, open5: !locked5,
      kDep: E.fmtUSD(t.deposit), kRec: E.fmtUSD(t.received), kVar: E.fmtUSD(t.variance),
      kVarBoxStyle: varOK
        ? { background: "#E4F3EB", border: "1.5px solid #9CD4B2", borderRadius: 11, padding: "13px 15px", display: "flex", alignItems: "center", justifyContent: "space-between" }
        : { background: "#FBEDEA", border: "1.5px solid #E5A797", borderRadius: 11, padding: "13px 15px", display: "flex", alignItems: "center", justifyContent: "space-between" },
      kVarLabelStyle: { fontSize: 11, fontWeight: 700, letterSpacing: ".05em", color: varOK ? "#1E7A4C" : "#A63A24" },
      kVarValStyle: { fontFamily: MONO, fontSize: 21, fontWeight: 600, marginTop: 3, color: varOK ? "#1E7A4C" : "#A63A24" },
      kBadgeStyle: varOK
        ? { background: "#1E7A4C", color: "#fff", borderRadius: 14, padding: "4px 12px", fontSize: 11.5, fontWeight: 800, letterSpacing: ".05em" }
        : { background: "#C2452D", color: "#fff", borderRadius: 14, padding: "4px 12px", fontSize: 11.5, fontWeight: 800, letterSpacing: ".05em" },
      kBadge: varOK ? "BALANCED" : "OFF BY " + E.fmtUSD(Math.abs(t.variance)),
      recapLines,
      signName: d.signName, onSignName: ev => { d.signName = ev.target.value; this.refresh(); },
      signChecked: d.signChecked, onSignCheck: ev => { d.signChecked = ev.target.checked; this.refresh(); },
      signDate: E.fmtMDY(new Date().toISOString().slice(0, 10)),
      jeRefStr: "DD" + E.mmddyy(d.cashDate),
      onGenerate: this.onGenerate,
      generated: this.generated && !!this.lastPosting,
      jeCount: this.lastPosting ? this.lastPosting.length : 0,
      jeBalStr: E.money(jeBal),
      jeBalStyle: { fontFamily: MONO, color: Math.abs(jeBal) < 0.005 ? "#1E7A4C" : "#B3362A" },
      jeRows, jeText: this.lastPosting ? E.jeStrings(this.lastPosting).join("\n") : "",
      copyLabel: ui.copyLabel, onCopy: this.onCopy, onDlJe: this.onDlJe,
      onPdf: this.onPdf, onXlsx: this.onXlsx,
      /* setup */
      setupOpen: ui.setupOpen,
      onOverlayClick: () => this.closeSetup(),
      stop: ev => ev.stopPropagation(),
      onSetupClose: this.closeSetup, onSetupReset: this.onSetupReset,
      onSetupExport: this.onSetupExport,
      onSetupImportClick: () => this.cfgRef.current && this.cfgRef.current.click(),
      onSetupApply: this.onSetupApply,
      ...suVals,
      schRef: this.schRef, ccRef: this.ccRef, sesRef: this.sesRef, cfgRef: this.cfgRef,
      onSesFile: this.onSesFile, onCfgFile: this.onCfgFile,
    };
  }
}
try {
  window.__app = new Component();
  window.__app.mount();
} catch (err) { window.onerror(err && err.message || String(err)); throw err; }
</script>
</body>
</html>
