name: Publish Tool Releases

# Discovers every company folder (any second-level dir that isn't `_shared`)
# plus the shared masters, and publishes one rolling "latest" release per group.
# A group is only (re)published when one of ITS OWN files has changed since that
# group's previous release — an unrelated change elsewhere won't churn it.
# Add a new company by simply committing its folder — no edits here needed.

on:
  push:
    branches: [main]
    paths:
      - 'AR/**'
      - 'AP/**'
      - 'Powerposting/**'
      - 'Floorplan/**'
      - 'GL-Reconciliation/**'
      - 'Parts/**'
      - 'Vehicle-Sales/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Discover release groups ──────────────────────────────────────────────────
  discover:
    name: Discover release groups
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build release matrix
        id: find
        run: |
          set -euo pipefail

          # Distinct second-level folder names that hold a releasable file and
          # aren't `_shared`. These are the per-company / per-group builds.
          companies=$(find . -type f \( -name '*.html' -o -name '*.xlsm' \) \
            -not -path './.*' \
            -not -path '*/src/*' \
            -not -path '*/templates/*' \
            -not -path '*/web/*' \
            -not -path './docs/*' \
            -not -path './Documentation/*' \
            | sed -E 's#^\./##' \
            | awk -F/ 'NF>=2 {print $2}' \
            | grep -v '^_shared$' \
            | sort -u)

          entries=()
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            tag=$(printf '%s' "$c" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
            entries+=("$(jq -nc \
              --arg name "$c Tools – Latest" \
              --arg tag "${tag}-latest" \
              --arg path "$c" \
              '{name:$name, tag:$tag, path:$path}')")
          done <<< "$companies"

          # The store-agnostic masters always ship as one "master" release.
          entries+=("$(jq -nc '{name:"Master Tools – Latest", tag:"master-latest", path:"_shared"}')")

          matrix=$(printf '%s\n' "${entries[@]}" | jq -cs '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered release groups:"
          printf '%s\n' "${entries[@]}" | jq -r '"  - \(.name)  [\(.tag)]  <- */\(.path)/**"'

  # ── Publish one release per group (only if that group changed) ───────────────
  release:
    name: Publish ${{ matrix.name }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + tags so we can diff against the last release

      - name: Detect whether this group changed
        id: gate
        env:
          MATRIX_PATH: ${{ matrix.path }}
          MATRIX_TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          prev=$(git rev-parse -q --verify "refs/tags/${MATRIX_TAG}^{commit}" 2>/dev/null || true)
          if [ -z "$prev" ]; then
            echo "No previous '${MATRIX_TAG}' release — publishing initial release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$prev" HEAD | grep -qE "^[^/]+/${MATRIX_PATH}/"; then
            echo "Changes detected under */${MATRIX_PATH}/ since ${MATRIX_TAG} — republishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes under */${MATRIX_PATH}/ since ${MATRIX_TAG} — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes + verify embedded descriptions
        if: steps.gate.outputs.changed == 'true'
        env:
          MATRIX_PATH: ${{ matrix.path }}
          MATRIX_TAG: ${{ matrix.tag }}
          MATRIX_NAME: ${{ matrix.name }}
        run: bash .github/scripts/gen-release-notes.sh > RELEASE_BODY.md

      - name: Delete existing release + tag
        if: steps.gate.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          TAG: ${{ matrix.tag }}
        with:
          script: |
            const tag = process.env.TAG;
            try {
              const rel = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                release_id: rel.data.id
              });
            } catch (e) { if (e.status !== 404) throw e; }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `tags/${tag}`
              });
            } catch (e) { if (e.status !== 422 && e.status !== 404) throw e; }

      - name: Publish release
        if: steps.gate.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ${{ matrix.name }}
          body_path: RELEASE_BODY.md
          files: |
            */${{ matrix.path }}/*.html
            */${{ matrix.path }}/**/*.html
            */${{ matrix.path }}/*.xlsm
            */${{ matrix.path }}/**/*.xlsm
            !**/src/**
            !**/templates/**
            !**/web/**
